<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Video</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: #020617;
    color: #e5e7eb;
    font-family: sans-serif;
}
.btn {
    padding: 10px;
    border-radius: 8px;
    margin-top: 10px;
    display: block;
}
.btn-primary { background: #6366f1; }
.btn-secondary { background: #374151; }
</style>
</head>

<body class="flex items-center justify-center min-h-screen">

<div class="w-full max-w-xl p-6 text-center">

    <h2 id="file-name" class="text-xl font-bold mb-2"></h2>
    <p id="file-size" class="text-gray-400 mb-4"></p>

    <!-- VIDEO PLAYER -->
    <video id="video-player" controls style="width:100%; display:none;"></video>

    <!-- BUTTONS -->
    <div id="buttons"></div>

</div>

<script>
const BASE_URL = window.location.origin;
const FILE_ID = window.location.pathname.split("/").pop();

async function loadFile() {
    try {
        const res = await fetch(`${BASE_URL}/api/file/${FILE_ID}`);
        const data = await res.json();

        document.getElementById("file-name").innerText = data.file_name;
        document.getElementById("file-size").innerText = "Size: " + data.file_size;

        const video = document.getElementById("video-player");
        video.src = data.direct_dl_link;
        video.style.display = "block";

        document.getElementById("buttons").innerHTML = `
            <a href="${data.direct_dl_link}" class="btn btn-primary">⬇ Download</a>
            <a href="${data.mx_player_link}" class="btn btn-secondary">▶ Play in MX Player</a>
            <a href="${data.vlc_player_link}" class="btn btn-secondary">▶ Play in VLC</a>
        `;

    } catch (e) {
        document.body.innerHTML = "<h2>Error loading video</h2>";
    }
}

loadFile();
</script>

</body>
</html>
